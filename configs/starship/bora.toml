# ============================================================
#  bora ‚Äî dark hacker terminal
#  Requer: Nerd Font (JetBrainsMono)
# ============================================================

palette = "bora"

format = """
[‚îå](fg:border) $os\
$directory\
${custom.git_remote}\
$git_branch\
$git_status\
$git_metrics\
$fill\
$docker_context\
$kubernetes\
$terraform\
$aws\
$gcloud\
$java\
$ruby\
$python\
$golang\
$rust\
$nodejs\
$elixir\
$dart\
$php\
$cmd_duration\
$time
[‚îî](fg:border) $character"""

add_newline = true
command_timeout = 2000

[palettes.bora]
border   = "#4a4e69"
dim      = "#6c7086"
text     = "#bac2de"
bright   = "#cdd6f4"
green    = "#50fa7b"
red      = "#ff5555"
yellow   = "#f1fa8c"
cyan     = "#8be9fd"
purple   = "#bd93f9"
orange   = "#ffb86c"
pink     = "#ff79c6"
blue     = "#6272a4"

[fill]
symbol = " "

# ‚îÄ‚îÄ OS ‚îÄ‚îÄ
[os]
disabled = false
style = "fg:green"
format = "[$symbol ]($style)"

[os.symbols]
Ubuntu = ""
Linux = ""
Mint = "Û∞£≠"
Pop = ""
Arch = ""
Fedora = ""
Debian = ""
Manjaro = ""
Windows = ""
Macos = ""

# ‚îÄ‚îÄ Diretorio ‚îÄ‚îÄ
[directory]
truncation_length = 3
truncation_symbol = "‚Ä¶/"
home_symbol = "~"
style = "bold fg:bright"
read_only = " "
read_only_style = "fg:red"
repo_root_style = "bold fg:green"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "
format = "[$path]($style)[$read_only]($read_only_style) "

# ‚îÄ‚îÄ Git ‚îÄ‚îÄ
[git_branch]
symbol = " "
style = "fg:purple"
format = "[$symbol$branch(:$remote_branch)]($style) "
truncation_length = 30

[git_status]
style = "fg:yellow"
format = '([$all_status$ahead_behind]($style) )'
ahead = "‚á°${count}"
behind = "‚á£${count}"
diverged = "‚áï‚á°${ahead_count}‚á£${behind_count}"
conflicted = "=${count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "¬ª${count}"
deleted = "‚úò${count}"
stashed = "*${count}"
up_to_date = ""

[git_metrics]
disabled = false
added_style = "fg:green"
deleted_style = "fg:red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
only_nonzero_diffs = true

# ‚îÄ‚îÄ Prompt ‚îÄ‚îÄ
[character]
success_symbol = "[‚ùØ](fg:green)"
error_symbol = "[‚ùØ](fg:red)"
vimcmd_symbol = "[‚ùÆ](fg:green)"

# ‚îÄ‚îÄ Tempo ‚îÄ‚îÄ
[cmd_duration]
min_time = 2000
style = "fg:yellow"
format = "[Û±é´ $duration]($style) "
show_milliseconds = false

[time]
disabled = false
style = "fg:text"
format = "[ $time]($style)"
time_format = "%H:%M"

# ‚îÄ‚îÄ DevOps ‚îÄ‚îÄ
[docker_context]
symbol = "Û∞°® "
style = "fg:cyan"
format = "[$symbol$context]($style) "
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile", "compose.yml", "compose.yaml"]

[kubernetes]
disabled = false
symbol = "Û±Éæ "
style = "fg:cyan"
format = "[$symbol$context( \\($namespace\\))]($style) "
detect_files = ["k8s", "kubernetes", "kustomization.yaml"]

[terraform]
disabled = false
symbol = "Û±Å¢ "
style = "fg:purple"
format = "[$symbol$version( $workspace)]($style) "
detect_files = ["*.tf", "*.hcl", ".terraform"]

[aws]
disabled = false
symbol = " "
style = "fg:orange"
format = "[$symbol($profile )(\\($region\\))]($style) "

[gcloud]
disabled = false
symbol = "Û±á∂ "
style = "fg:cyan"
format = "[$symbol($project)]($style) "

# ‚îÄ‚îÄ Linguagens ‚îÄ‚îÄ
[java]
symbol = " "
style = "fg:orange"
format = "[$symbol$version]($style) "
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", ".java-version"]

[ruby]
symbol = " "
style = "fg:red"
format = "[$symbol$version]($style) "
detect_files = ["Gemfile", ".ruby-version"]

[python]
symbol = " "
style = "fg:yellow"
format = '[${symbol}(${version} )(\($virtualenv\) )]($style)'
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile", ".python-version"]

[nodejs]
symbol = "Û∞éô "
style = "fg:green"
format = "[$symbol$version]($style) "
detect_files = ["package.json", ".nvmrc"]

[golang]
symbol = "Û∞üì "
style = "fg:cyan"
format = "[$symbol$version]($style) "
detect_files = ["go.mod", "go.sum"]

[rust]
symbol = "Û±òó "
style = "fg:orange"
format = "[$symbol$version]($style) "
detect_files = ["Cargo.toml"]

[elixir]
symbol = " "
style = "fg:purple"
format = "[$symbol$version]($style) "
detect_files = ["mix.exs"]

[dart]
symbol = " "
style = "fg:cyan"
format = "[$symbol$version]($style) "
detect_files = ["pubspec.yaml"]

[php]
symbol = "Û∞åü "
style = "fg:purple"
format = "[$symbol$version]($style) "
detect_files = ["composer.json"]

# ‚îÄ‚îÄ Git Remote (GitHub, GitLab, Bitbucket, etc) ‚îÄ‚îÄ
[custom.git_remote]
command = "remote=$(git remote get-url origin 2>/dev/null); [ -z \"$remote\" ] && exit; repo=$(echo $remote | sed 's|.*[:/]\\([^/]*/[^/]*\\)$|\\1|;s|\\.git$||'); case $remote in *github*) printf '\\uf09b';; *gitlab*) printf '\\uf296';; *bitbucket*) printf '\\uf171';; *) printf '\\ue702';; esac; printf \" $repo\""
detect_folders = [".git"]
shell = ["bash", "--noprofile", "--norc"]
style = "fg:dim"
format = "[$output ]($style)"
description = "Git remote provider icon"

# ‚îÄ‚îÄ Desabilitados ‚îÄ‚îÄ
[username]
disabled = true

[hostname]
disabled = true

[package]
disabled = true

[battery]
disabled = true

[memory_usage]
disabled = true

[container]
disabled = true

[shlvl]
disabled = true

[azure]
disabled = true

[lua]
disabled = true

[kotlin]
disabled = true

[zig]
disabled = true
